services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mc_user
      POSTGRES_PASSWORD: mc_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc_user -d mission_control"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mc_user:mc_pass@db:5432/mission_control
      DEBUG: "true"
      MC_ROOT: /app/.mc
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    volumes:
      - .mc:/app/.mc

volumes:
  pgdata: